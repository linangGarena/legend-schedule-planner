    function consecutiveWindowBalance(schedule, days) {
      const teams = cleanTeams();
      const counts = Object.fromEntries(teams.map(team => [team, 0]));
      teams.forEach(team => {
        const dates = [...new Set(schedule
          .filter(row => [row.left, row.right].includes(team))
          .map(row => row.date))]
          .sort();
        for (let index = 0; index <= dates.length - days; index++) {
          let consecutive = true;
          for (let offset = 1; offset < days; offset++) {
            if (daysBetween(dates[index + offset - 1], dates[index + offset]) !== 1) {
              consecutive = false;
              break;
            }
          }
          if (consecutive) counts[team]++;
        }
      });
      const values = Object.values(counts);
      const max = values.length ? Math.max(...values) : 0;
      const min = values.length ? Math.min(...values) : 0;
      return {
        counts,
        diff: max - min,
        max,
        min,
        maxTeams: teams.filter(team => counts[team] === max),
        minTeams: teams.filter(team => counts[team] === min)
      };
    }

    function addDays(dateString, delta) {
      const date = new Date(`${dateString}T00:00:00`);
      date.setDate(date.getDate() + delta);
      return formatDate(date);
    }

    function bindSearch() {
      const input = document.getElementById("searchInput");
      input.addEventListener("input", renderSearchResults);
    }

    function renderSearchResults() {
      const box = document.getElementById("searchResults");
      if (!box) return;
      const query = (document.getElementById("searchInput")?.value || "").trim().toLowerCase();
      const results = state.data.schedules
        .filter(item => canEdit() || item.status === "final")
        .filter(item => !query || item.seasonName.toLowerCase().includes(query));
      box.innerHTML = results.length ? results.map(item => `
        <article class="card">
          <h3>${escapeHtml(item.seasonName)}</h3>
          <div class="meta">
            狀態：${item.status === "final" ? "最終版本" : "未確認版本"}<br>
            賽制：${formatLabel(item.format)}<br>
            場次：${item.schedule.length}<br>
            更新：${escapeHtml(item.updatedAt || "")}
          </div>
          <div class="toolbar">
            <button data-view-schedule="${item.id}">查看</button>
            ${canEdit() ? `<button class="primary" data-edit-schedule="${item.id}">編輯</button>` : ""}
          </div>
        </article>
      `).join("") : `<div class="status">沒有符合的賽程。</div>`;
      box.querySelectorAll("[data-view-schedule]").forEach(btn => btn.addEventListener("click", () => showScheduleDetail(btn.dataset.viewSchedule)));
      box.querySelectorAll("[data-edit-schedule]").forEach(btn => btn.addEventListener("click", () => editSchedule(btn.dataset.editSchedule)));
    }

    function showScheduleDetail(id) {
      const item = state.data.schedules.find(schedule => schedule.id === id);
      const panel = document.getElementById("searchDetail");
      if (!item) return;
      panel.classList.remove("hidden");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>${escapeHtml(item.seasonName)}</h2>
          <button id="closeDetailBtn">關閉</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>日期</th><th>Match</th><th>左方隊伍</th><th>右方隊伍</th><th>輪次</th><th>組別</th><th>備註</th></tr></thead>
            <tbody>${item.schedule.map((row, index) => `
              <tr><td>${index + 1}</td><td>${row.date}</td><td>Match${row.match}</td><td>${escapeHtml(row.left)}</td><td>${escapeHtml(row.right)}</td><td>${row.round}</td><td>${escapeHtml(row.group || "")}</td><td>${escapeHtml(row.note || "")}</td></tr>
            `).join("")}</tbody>
          </table>
        </div>
      `;
      document.getElementById("closeDetailBtn").addEventListener("click", () => panel.classList.add("hidden"));
    }

    function editSchedule(id) {
      const item = state.data.schedules.find(schedule => schedule.id === id);
      if (!item || !canEdit()) return;
      state.planner = JSON.parse(JSON.stringify(item));
      state.planner.status = "draft";
      state.currentView = "planner";
      render();
      showPlannerMessage(`已載入${item.status === "final" ? "最終版本" : "未確認版本"}，可繼續編輯、儲存或送出。`, "warn");
    }

    function bindAdmin() {
      if (!document.getElementById("view-admin")) return;
      document.getElementById("currentRoleNote").value = `${state.currentEmail} / ${roleLabel(roleOf(state.currentEmail))}`;
      document.getElementById("addRoleBtn").addEventListener("click", async () => {
        const email = document.getElementById("roleEmail").value.trim().toLowerCase();
        const role = document.getElementById("roleSelect").value;
        if (!email || email === OWNER_EMAIL) return;
        await saveRole(email, role);
        renderRoles();
      });
      renderRoles();
    }

    function renderRoles() {
      const body = document.getElementById("rolesBody");
      if (!body) return;
      const rows = [[OWNER_EMAIL, "owner"], ...Object.entries(state.data.roles)];
      body.innerHTML = rows.map(([email, role]) => `
        <tr>
          <td>${escapeHtml(email)}</td>
          <td>${roleLabel(role)}</td>
          <td>${role === "owner" ? "-" : `<button class="danger" data-remove-role="${escapeAttr(email)}">移除</button>`}</td>
        </tr>
      `).join("");
      body.querySelectorAll("[data-remove-role]").forEach(btn => {
        btn.addEventListener("click", async () => {
          await removeRole(btn.dataset.removeRole);
          renderRoles();
        });
      });
    }

    function exportCsv() {
      if (!state.planner.schedule.length) return;
      const csv = toDelimited(",");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${state.planner.seasonName || "schedule"}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function copySheetData() {
      const text = toDelimited("\t");
      document.getElementById("sheetOutput").value = text;
      navigator.clipboard?.writeText(text);
      showPlannerMessage("已產生並嘗試複製 Google Sheet 貼上資料。", "ok");
    }

    function setSheetOutput() {
      const output = document.getElementById("sheetOutput");
      if (output) output.value = state.planner.schedule.length ? toDelimited("\t") : "";
    }

    function toDelimited(delimiter) {
      const headers = ["日期", "Match", "左方隊伍", "右方隊伍", "輪次", "組別", "備註"];
      const rows = state.planner.schedule.map(row => [row.date, `Match${row.match}`, row.left, row.right, row.round, row.group || "", row.note || ""]);
      return [headers, ...rows].map(row => row.map(cell => quoteCell(cell, delimiter)).join(delimiter)).join("\n");
    }

    function quoteCell(cell, delimiter) {
      const text = String(cell ?? "");
      if (delimiter === "\t") return text.replace(/\t/g, " ").replace(/\r?\n/g, " ");
      return `"${text.replace(/"/g, '""')}"`;
    }

    function showPlannerMessage(message, type = "") {
      const box = document.getElementById("plannerMessage");
      if (!box) return;
      box.innerHTML = `<div class="status ${type}">${escapeHtml(message)}</div>`;
    }

    function roleLabel(role) {
      return { owner: "擁有者", admin: "管理員", user: "使用者", guest: "未授權" }[role] || "未授權";
    }

    function formatLabel(format) {
      return { single: "單循環", double: "雙循環", "group-single": "分組競賽單循環" }[format] || format;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    render();
  </script>
</body>
</html>
